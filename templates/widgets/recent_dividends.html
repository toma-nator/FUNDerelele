<table class="data-table mini">
  <thead>
    <tr><th>Date</th><th>Ticker</th><th>Account</th><th class="r">Amount</th></tr>
  </thead>
  <tbody>
    {% for r in rows %}
    <tr>
      <td class="text-dim">{{ r.date }}</td>
      <td class="mono ticker">{{ r.ticker }}</td>
      <td class="text-dim">{{ r.account }}</td>
      <td class="r mono text-green">{{ r.amount }}</td>
    </tr>
    {% else %}
    <tr><td colspan="4" class="empty-row">No dividends recorded yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
