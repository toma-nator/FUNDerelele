<table class="data-table mini">
  <thead>
    <tr><th>Date</th><th>Type</th><th>Ticker</th><th>Account</th><th class="r">Amount</th></tr>
  </thead>
  <tbody>
    {% for r in rows %}
    <tr>
      <td class="text-dim">{{ r.date }}</td>
      <td>{{ r.type }}</td>
      <td class="mono ticker">{{ r.ticker | tlabel }}</td>
      <td class="text-dim">{{ r.account }}</td>
      <td class="r mono {{ r.amount_cls }}">{{ r.amount }}</td>
    </tr>
    {% else %}
    <tr><td colspan="5" class="empty-row">No transactions yet.</td></tr>
    {% endfor %}
  </tbody>
</table>
